name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Install Distribution Certificate
      run: |
        # Create temporary keychain
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Decode and import the distribution certificate
        echo "${{ secrets.DISTRIBUTION_CERT_P12 }}" | base64 --decode > $RUNNER_TEMP/distribution.p12
        security import $RUNNER_TEMP/distribution.p12 \
          -P "${{ secrets.DISTRIBUTION_CERT_PASSWORD }}" \
          -A -t cert -f pkcs12 \
          -k $KEYCHAIN_PATH

        # Add keychain to search list
        security list-keychains -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | tr -d '"')
        security default-keychain -s $KEYCHAIN_PATH

        # Allow codesign to access the keychain without prompt
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Verify certificate is installed
        echo "=== Installed certificates ==="
        security find-identity -v -p codesigning $KEYCHAIN_PATH

        # Clean up p12
        rm -f $RUNNER_TEMP/distribution.p12

    - name: Clean old derived data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

    - name: Archive iOS App
      run: |
        cd ios/App
        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi
        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          CURRENT_PROJECT_VERSION=${{ github.run_number }} \
          clean archive

        echo "=== Archive completed ==="
        echo "=== Signing identity used ==="
        codesign -dvv $RUNNER_TEMP/App.xcarchive/Products/Applications/App.app 2>&1 | grep -E "Authority|Team" || true

    - name: Export IPA for App Store
      run: |
        python3 -c "
        import plistlib
        opts = {
            'method': 'app-store-connect',
            'signingStyle': 'automatic',
            'teamID': '${{ secrets.APPLE_TEAM_ID }}',
            'uploadSymbols': True,
            'manageAppVersionAndBuildNumber': False,
        }
        with open('${{ runner.temp }}/ExportOptions.plist', 'wb') as f:
            plistlib.dump(opts, f)
        "
        plutil -lint ${{ runner.temp }}/ExportOptions.plist

        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

        echo "=== Export completed ==="
        ls -la $RUNNER_TEMP/export/

        IPA=$(find $RUNNER_TEMP/export -name '*.ipa' -print -quit)
        if [ -z "$IPA" ]; then
          echo "::error::No IPA file found!"
          exit 1
        fi
        echo "IPA_PATH=$IPA" >> $GITHUB_ENV

        echo "=== Verify IPA signing ==="
        mkdir -p /tmp/ipa-check
        unzip -q "$IPA" -d /tmp/ipa-check
        codesign -dvv /tmp/ipa-check/Payload/App.app 2>&1 | grep -E "Authority|Team|Identifier"
        rm -rf /tmp/ipa-check

    - name: Upload to App Store Connect
      run: |
        echo "Uploading $IPA_PATH..."
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
          --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
          --verbose 2>&1 | tee /tmp/upload.log

        if grep -qi "No errors uploading" /tmp/upload.log; then
          echo ""
          echo "✅ Upload successful! TestFlight'da ~10-30 dk icinde gorunecek."
        elif grep -qi "Validation failed\|UPLOAD FAILED\|Failed to upload" /tmp/upload.log; then
          echo "::error::Upload failed!"
          exit 1
        else
          echo "Upload durumu belirsiz. App Store Connect'i kontrol edin."
        fi

    - name: Cleanup keychain
      if: always()
      run: |
        security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          ${{ runner.temp }}/export/
        retention-days: 7
