name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Archive iOS App
      run: |
        cd ios/App
        rm -rf ~/Library/Developer/Xcode/DerivedData/App-*
        xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          clean archive

    - name: Create ExportOptions
      run: |
        cd ios/App
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>app-store-connect</string>\n  <key>signingStyle</key>\n  <string>automatic</string>\n  <key>teamID</key>\n  <string>${{ secrets.APPLE_TEAM_ID }}</string>\n  <key>uploadSymbols</key>\n  <true/>\n  <key>manageAppVersionAndBuildNumber</key>\n  <true/>\n  <key>signingCertificate</key>\n  <string>Apple Distribution</string>\n</dict>\n</plist>\n' > ExportOptions.plist
        cat ExportOptions.plist

    - name: Export IPA
      run: |
        cd ios/App
        xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

    - name: Upload to App Store Connect
      env:
        API_PRIVATE_KEYS_DIR: ~/private_keys
      run: |
        cd ios/App
        echo "=== Uploading IPA to App Store Connect ==="
        ls -la build/export/
        IPA_FILE=$(find build/export -name '*.ipa' -print -quit)
        if [ -z "$IPA_FILE" ]; then
          echo "ERROR: No IPA file found in build/export/"
          exit 1
        fi
        echo "Found IPA: $IPA_FILE"
        echo "Uploading via xcrun altool..."
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_FILE" \
          --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
          --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
          --verbose || {
          echo "altool failed, trying xcodebuild upload..."
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/upload \
            -exportOptionsPlist <(printf '<?xml version="1.0" encoding="UTF-8"?>\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>app-store-connect</string>\n  <key>destination</key>\n  <string>upload</string>\n  <key>signingStyle</key>\n  <string>automatic</string>\n  <key>teamID</key>\n  <string>'"${{ secrets.APPLE_TEAM_ID }}"'</string>\n</dict>\n</plist>') \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_"${{ secrets.APPSTORE_KEY_ID }}".p8 \
            -authenticationKeyID "${{ secrets.APPSTORE_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_ISSUER_ID }}"
        }
        echo "Upload completed successfully!"

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/App/build/export/
        retention-days: 7
