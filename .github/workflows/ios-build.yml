name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Install CocoaPods dependencies (if needed)
      run: |
        cd ios/App
        if [ -f Podfile ]; then
          pod install
        fi

    - name: Archive iOS App
      run: |
        cd ios/App
        rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

        # Determine workspace vs project
        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi

        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          clean archive

    - name: Create ExportOptions
      run: |
        cat > ios/App/ExportOptions.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>destination</key>
          <string>upload</string>
          <key>signingStyle</key>
          <string>automatic</string>
          <key>teamID</key>
        PLIST
        echo "  <string>${{ secrets.APPLE_TEAM_ID }}</string>" >> ios/App/ExportOptions.plist
        cat >> ios/App/ExportOptions.plist << 'PLIST'
          <key>uploadSymbols</key>
          <true/>
          <key>manageAppVersionAndBuildNumber</key>
          <true/>
        </dict>
        </plist>
        PLIST
        echo "=== ExportOptions.plist ==="
        cat ios/App/ExportOptions.plist

    - name: Export and Upload to App Store Connect
      run: |
        cd ios/App
        xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}
        echo "=== Export completed ==="
        ls -la build/export/

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/App/build/export/
        retention-days: 7
