name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Archive iOS App
      run: |
        cd ios/App
        rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

        # Determine workspace vs project
        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi

        # Archive with automatic signing (development)
        # Export step will re-sign with distribution certificate
        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          clean archive

        echo "=== Archive completed ==="
        ls -la build/App.xcarchive/

    - name: Export and Upload to App Store Connect
      run: |
        cd ios/App

        # Create ExportOptions - app-store-connect method with upload destination
        # This re-signs with Apple Distribution certificate automatically
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>destination</key>
          <string>upload</string>
          <key>signingStyle</key>
          <string>automatic</string>
          <key>teamID</key>
          <string>${{ secrets.APPLE_TEAM_ID }}</string>
          <key>uploadSymbols</key>
          <true/>
          <key>manageAppVersionAndBuildNumber</key>
          <true/>
        </dict>
        </plist>
        EOF

        echo "=== ExportOptions.plist ==="
        cat ExportOptions.plist

        # Export with re-signing for App Store distribution + direct upload
        xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

        echo "=== Export and Upload completed ==="
        ls -la build/export/ || true

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: ios/App/build/export/
        retention-days: 7
