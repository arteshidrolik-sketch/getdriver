name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Clean old derived data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

    - name: Archive iOS App
      run: |
        cd ios/App
        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi
        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          clean archive
        echo "=== Archive completed ==="

    - name: Export IPA (local, no upload)
      run: |
        python3 -c "
        import plistlib
        opts = {
            'method': 'app-store-connect',
            'signingStyle': 'automatic',
            'teamID': '${{ secrets.APPLE_TEAM_ID }}',
            'uploadSymbols': True,
            'manageAppVersionAndBuildNumber': True,
        }
        with open('${{ runner.temp }}/ExportOptions.plist', 'wb') as f:
            plistlib.dump(opts, f)
        "
        plutil -lint ${{ runner.temp }}/ExportOptions.plist

        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

        echo "=== Export completed ==="
        ls -la $RUNNER_TEMP/export/

        IPA=$(find $RUNNER_TEMP/export -name '*.ipa' -print -quit)
        if [ -z "$IPA" ]; then
          echo "::error::No IPA file found!"
          exit 1
        fi
        echo "IPA_PATH=$IPA" >> $GITHUB_ENV

        echo "=== Verify signing ==="
        mkdir -p /tmp/ipa-check
        unzip -q "$IPA" -d /tmp/ipa-check
        codesign -dvv /tmp/ipa-check/Payload/App.app 2>&1 | grep -E "Authority|Team|Identifier"
        codesign -dvv /tmp/ipa-check/Payload/App.app/Frameworks/Capacitor.framework 2>&1 | grep -E "Authority|Team"
        rm -rf /tmp/ipa-check

    - name: Upload to App Store Connect via xcrun
      run: |
        echo "Uploading $IPA_PATH..."
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
          --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
          --verbose 2>&1 | tee /tmp/upload.log

        if grep -qi "No errors uploading" /tmp/upload.log; then
          echo ""
          echo "✅ Upload successful! TestFlight'da ~10-30 dk içinde görünecek."
        elif grep -qi "Validation failed\|UPLOAD FAILED\|Failed to upload" /tmp/upload.log; then
          echo "::error::Upload failed! Logları kontrol edin."
          exit 1
        else
          echo "⚠️ Upload durumu belirsiz. App Store Connect'i kontrol edin."
        fi

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          ${{ runner.temp }}/export/
        retention-days: 7
