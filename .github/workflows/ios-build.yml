name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Clean old derived data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

    - name: Archive iOS App
      run: |
        cd ios/App

        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi

        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Automatic \
          clean archive

        echo "=== Archive completed ==="

    - name: Export and Upload to App Store Connect
      run: |
        # ExportOptions with destination=upload
        # This makes xcodebuild export + upload in one step (no altool needed)
        cat > $RUNNER_TEMP/ExportOptions.plist << 'PLISTEOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>app-store-connect</string>
  <key>destination</key>
  <string>upload</string>
  <key>signingStyle</key>
  <string>automatic</string>
  <key>teamID</key>
PLISTEOF
        echo "  <string>${{ secrets.APPLE_TEAM_ID }}</string>" >> $RUNNER_TEMP/ExportOptions.plist
        cat >> $RUNNER_TEMP/ExportOptions.plist << 'PLISTEOF'
  <key>uploadSymbols</key>
  <true/>
  <key>manageAppVersionAndBuildNumber</key>
  <true/>
</dict>
</plist>
PLISTEOF

        echo "=== ExportOptions ==="
        cat $RUNNER_TEMP/ExportOptions.plist
        plutil -lint $RUNNER_TEMP/ExportOptions.plist

        # Export + Upload in one step via xcodebuild
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}

        echo ""
        echo "✅ Export and upload completed!"
        echo "Build will appear in TestFlight after Apple processing (~10-30 min)"
        ls -la $RUNNER_TEMP/export/ || true

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          ${{ runner.temp }}/export/
        retention-days: 7
