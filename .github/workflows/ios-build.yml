name: iOS Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build web app (mobile/static export)
      run: npm run build:ios

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Setup App Store Connect API Key
      run: |
        mkdir -p ~/private_keys
        echo "${{ secrets.APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8
        chmod 600 ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

    - name: Clean old derived data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData/App-*

    - name: Archive iOS App (Distribution signing)
      run: |
        cd ios/App
        if [ -d App.xcworkspace ]; then
          BUILD_TARGET="-workspace App.xcworkspace"
        else
          BUILD_TARGET="-project App.xcodeproj"
        fi
        xcodebuild $BUILD_TARGET \
          -scheme App \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }} \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          clean archive
        echo "=== Archive completed ==="
        codesign -dvv $RUNNER_TEMP/App.xcarchive/Products/Applications/App.app 2>&1 || true

    - name: Create ExportOptions and Export IPA
      run: |
        printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>method</key>\n  <string>app-store-connect</string>\n  <key>signingStyle</key>\n  <string>manual</string>\n  <key>teamID</key>\n  <string>${{ secrets.APPLE_TEAM_ID }}</string>\n  <key>uploadSymbols</key>\n  <true/>\n  <key>manageAppVersionAndBuildNumber</key>\n  <true/>\n</dict>\n</plist>\n' > $RUNNER_TEMP/ExportOptions.plist
        plutil -lint $RUNNER_TEMP/ExportOptions.plist
        cat $RUNNER_TEMP/ExportOptions.plist
        xcodebuild -exportArchive \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -exportPath $RUNNER_TEMP/export \
          -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
          -authenticationKeyID ${{ secrets.APPSTORE_KEY_ID }} \
          -authenticationKeyIssuerID ${{ secrets.APPSTORE_ISSUER_ID }}
        echo "=== Export completed ==="
        ls -la $RUNNER_TEMP/export/
        IPA=$(find $RUNNER_TEMP/export -name '*.ipa' -print -quit)
        echo "IPA file: $IPA"
        echo "IPA_PATH=$IPA" >> $GITHUB_ENV

    - name: Upload to App Store Connect
      env:
        API_PRIVATE_KEYS_DIR: ~/private_keys
      run: |
        echo "Uploading $IPA_PATH to App Store Connect..."
        xcrun altool --upload-app \
          --type ios \
          --file "$IPA_PATH" \
          --apiKey "${{ secrets.APPSTORE_KEY_ID }}" \
          --apiIssuer "${{ secrets.APPSTORE_ISSUER_ID }}" \
          --verbose 2>&1 | tee /tmp/upload-output.txt
        if grep -qi "UPLOAD FAILED\|Failed to upload\|Validation failed" /tmp/upload-output.txt; then
          echo "::error::Upload FAILED - check logs above"
          exit 1
        fi
        echo "Upload completed successfully!"

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: |
          ${{ runner.temp }}/export/
        retention-days: 7
